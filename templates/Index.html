<!DOCTYPE html>
<html>
<head>
<title>CHAT PRIVADO</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
    color:white;
}

.container{
    max-width:500px;
    margin:50px auto;
    padding:20px;
    background:#151515;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,255,136,0.2);
}

h2{
    text-align:center;
    color:#00ff88;
}

input,textarea{
    width:100%;
    padding:12px;
    margin:8px 0;
    background:#222;
    border:none;
    border-radius:10px;
    color:white;
}

button{
    width:100%;
    padding:12px;
    background:linear-gradient(90deg,#00ff88,#00cc66);
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{transform:scale(1.03)}
</style>

</head>

<body>

<div class="container">
<h2>💬 PRIVADO</h2>

<input id="id" placeholder="ID usuario">
<input id="cc" placeholder="CC (opcional)">
<textarea id="msg" placeholder="mensaje"></textarea>

<button onclick="send()">ENVIAR</button>
</div>

<script>
async function send(){
  let id=document.getElementById("id").value;
  let cc=document.getElementById("cc").value;
  let msg=document.getElementById("msg").value;

  await fetch("/send",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id,cc,msg})
  });
}
</script>

</body>
</html>
