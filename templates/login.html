<!DOCTYPE html>
<html>
<head>
  <title>LOGIN</title>
  <style>
    body {
      margin:0;
      background:#0f0f0f;
      color:white;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box {
      background:#181818;
      padding:20px;
      border-radius:10px;
      width:300px;
    }

    h2 {
      text-align:center;
    }

    input {
      width:100%;
      padding:10px;
      margin-top:10px;
      background:#222;
      border:0;
      color:white;
    }

    button {
      width:100%;
      padding:10px;
      margin-top:15px;
      background:#333;
      border:0;
      color:white;
      cursor:pointer;
    }

    button:hover {
      background:#555;
    }

    .msg {
      margin-top:10px;
      text-align:center;
      color:red;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>🔐 ACCESO ADMIN</h2>

  <input id="user" placeholder="Usuario">
  <input id="pass" type="password" placeholder="Contraseña">

  <button onclick="login()">Entrar</button>

  <div class="msg" id="msg"></div>
</div>

<script>
function login() {
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u === "admin" && p === "1234") {
    window.location.href = "dashboard.html";
  } else {
    document.getElementById("msg").innerText = "❌ Acceso denegado";
  }
}
</script>

</body>
</html>
