<!DOCTYPE html>
<html>
<head>
<title>PRIVADO</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    padding:10px;
    background:#111;
}

.header button{
    padding:8px;
    background:#00ff88;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* CONTENEDOR */
.container{
    display:flex;
    gap:10px;
    padding:10px;
}

/* PANEL IZQ */
.left{
    width:40%;
}

/* PANEL DER */
.right{
    width:60%;
}

/* INPUTS */
input,textarea{
    width:100%;
    padding:10px;
    margin:5px 0;
    background:#222;
    border:none;
    border-radius:8px;
    color:white;
}

/* BOTON */
.send{
    width:100%;
    padding:10px;
    background:#00ff88;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* LOGS */
.logs{
    height:400px;
    overflow:auto;
    background:#111;
    padding:10px;
    border-radius:10px;
    font-size:13px;
    white-space:pre-wrap;
}
</style>

</head>

<body>

<div class="header">
    <button onclick="goGrupo()">👥 GRUPO</button>
    <button onclick="location.reload()">🔄 REFRESH</button>
</div>

<div class="container">

<div class="left">
<h3>💬 PRIVADO</h3>

<input id="id" placeholder="ID usuario">
<input id="cc" placeholder="CC opcional">
<textarea id="msg" placeholder="mensaje"></textarea>

<button class="send" onclick="send()">ENVIAR</button>
</div>

<div class="right">
<h3>📡 LOGS / CHAT</h3>
<div class="logs" id="logs"></div>
</div>

</div>

<script>
function goGrupo(){
    window.location.href="/grupo";
}

async function send(){
    let id=document.getElementById("id").value;
    let cc=document.getElementById("cc").value;
    let msg=document.getElementById("msg").value;

    await fetch("/send",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({id,cc,msg})
    });
}

async function loadLogs(){
    let res = await fetch("/logs");
    let data = await res.json();

    document.getElementById("logs").innerText =
        data.logs.join("");
}

// 🔥 AUTO REFRESH
setInterval(loadLogs, 2000);
loadLogs();
</script>

</body>
</html>
